services:
  - type: web
    name: haohanweb-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        sync: false
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 1433
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GAME_SERVER_TOKEN
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_DONATION_CHANNEL_ID
        sync: false
      - key: DISCORD_DONATION_AUTO_REFRESH
        value: true
      - key: DISCORD_DONATION_REFRESH_INTERVAL_SECONDS
        value: 86400
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      - key: RCON_HOST
        sync: false
      - key: RCON_PORT
        value: 25575
      - key: RCON_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
